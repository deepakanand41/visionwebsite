<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Admin Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4ff; color: #1a1a2e; }
    .header { background: linear-gradient(135deg, #0A3D91, #1a5cb8); color: white; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 1.25rem; }
    .header span { font-size: 0.8rem; opacity: 0.8; }
    .tabs { display: flex; gap: 0.5rem; padding: 1rem 2rem; background: white; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
    .tab { padding: 0.6rem 1.25rem; border-radius: 999px; border: 2px solid #e5e7eb; background: white; cursor: pointer; font-size: 0.875rem; font-weight: 600; color: #4b5563; transition: all 0.2s; }
    .tab.active { background: #0A3D91; color: white; border-color: #0A3D91; }
    .tab .count { background: rgba(255,255,255,0.2); padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.75rem; margin-left: 0.35rem; }
    .tab.active .count { background: rgba(255,255,255,0.25); }
    .content { padding: 1.5rem 2rem; max-width: 1500px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }
    .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; background: white; padding: 1rem; border-radius: 12px; border: 1px solid #e5e7eb; }
    .filters input, .filters select { padding: 0.55rem 0.85rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.85rem; min-width: 180px; }
    .filters input { flex: 1; min-width: 220px; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow-x: auto; box-shadow: 0 2px 12px rgba(10,61,145,0.06); }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 900px; }
    th { background: #f8faff; padding: 0.7rem 0.85rem; text-align: left; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; white-space: nowrap; position: sticky; top: 0; }
    td { padding: 0.7rem 0.85rem; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    tr:hover td { background: #f8faff; }
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px; font-size: 0.68rem; font-weight: 700; text-transform: capitalize; white-space: nowrap; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-contacted { background: #dbeafe; color: #1e40af; }
    .status-in_progress { background: #e0e7ff; color: #3730a3; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #f3f4f6; color: #4b5563; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .status-approved { background: #cffafe; color: #0e7490; }
    .status-onboarded { background: #dcfce7; color: #166534; }
    .badge-ielts { background: #dbeafe; color: #1d4ed8; }
    .badge-pte { background: #ffedd5; color: #c2410c; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .btn { padding: 0.4rem 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: #0A3D91; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-sm { padding: 0.3rem 0.55rem; font-size: 0.7rem; }
    .btn:hover { opacity: 0.92; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.75rem; }
    .toolbar h2 { font-size: 1rem; color: #0A3D91; }
    .empty { text-align: center; padding: 3rem; color: #9ca3af; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .modal.modal-lg { max-width: 680px; }
    .modal h3 { margin-bottom: 1rem; color: #0A3D91; }
    .form-group { margin-bottom: 0.85rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.85rem 1.25rem; border-radius: 10px; color: white; font-size: 0.875rem; font-weight: 500; z-index: 200; }
    .toast.success { background: #059669; }
    .toast.error { background: #dc2626; }
    .notes-preview { font-size: 0.72rem; color: #6b7280; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stat-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .stat-pill { padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; background: #f3f4f6; color: #374151; cursor: pointer; border: 1px solid transparent; }
    .stat-pill:hover, .stat-pill.active { border-color: #0A3D91; background: #eff6ff; color: #0A3D91; }
    .actions { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .media-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; border: 1px solid #e5e7eb; }
    .media-badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 6px; font-size: 0.65rem; font-weight: 700; background: #eff6ff; color: #1d4ed8; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🎓 Vision Admin Panel</h1>
      <span>Manage submissions, content, testimonials & more</span>
    </div>
    <button class="btn btn-secondary" onclick="loadAll()">↻ Refresh All</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="enquiries">Enquiries <span class="count" id="count-enquiries">0</span></button>
    <button class="tab" data-tab="demo">Demo Classes <span class="count" id="count-demo">0</span></button>
    <button class="tab" data-tab="loans">Education Loans <span class="count" id="count-loans">0</span></button>
    <button class="tab" data-tab="referrals">Referrals <span class="count" id="count-referrals">0</span></button>
    <button class="tab" data-tab="testimonials">Testimonials <span class="count" id="count-testimonials">0</span></button>
    <button class="tab" data-tab="news">News <span class="count" id="count-news">0</span></button>
    <button class="tab" data-tab="blog">Blog <span class="count" id="count-blog">0</span></button>
    <button class="tab" data-tab="offers">Offers <span class="count" id="count-offers">0</span></button>
  </div>

  <div class="content">
    <div id="panel-enquiries" class="panel active"></div>
    <div id="panel-demo" class="panel"></div>
    <div id="panel-loans" class="panel"></div>
    <div id="panel-referrals" class="panel"></div>
    <div id="panel-testimonials" class="panel"></div>
    <div id="panel-news" class="panel"></div>
    <div id="panel-blog" class="panel"></div>
    <div id="panel-offers" class="panel"></div>
  </div>

  <!-- Status Update Modal -->
  <div class="modal-overlay" id="status-modal">
    <div class="modal">
      <h3>Update Status</h3>
      <form id="status-form">
        <input type="hidden" id="s-type" />
        <input type="hidden" id="s-id" />
        <div class="form-group">
          <label>Status *</label>
          <select id="s-status" required></select>
        </div>
        <div class="form-group">
          <label>Admin Notes</label>
          <textarea id="s-notes" placeholder="Add notes about follow-up, call summary, etc."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeStatusModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Status</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Testimonial Modal -->
  <div class="modal-overlay" id="testimonial-modal">
    <div class="modal">
      <h3 id="t-modal-title">Add Testimonial</h3>
      <form id="testimonial-form">
        <input type="hidden" id="t-id" />
        <div class="form-row">
          <div class="form-group"><label>Name *</label><input id="t-name" required /></div>
          <div class="form-group"><label>Initials *</label><input id="t-initial" required maxlength="5" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Destination *</label><input id="t-destination" required /></div>
          <div class="form-group"><label>Course *</label><input id="t-course" required /></div>
        </div>
        <div class="form-group"><label>University *</label><input id="t-university" required /></div>
        <div class="form-group"><label>Review *</label><textarea id="t-review" required></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Rating</label><select id="t-rating"><option value="5">5</option><option value="4">4</option><option value="3">3</option></select></div>
          <div class="form-group"><label>Avatar Color</label><input id="t-color" type="color" value="#fde9d1" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Highlight</label><input id="t-highlight" /></div>
          <div class="form-group"><label>Sort Order</label><input id="t-sort" type="number" value="0" /></div>
        </div>
        <div class="form-group"><label>Status</label><select id="t-active"><option value="true">Active</option><option value="false">Inactive</option></select></div>
        <div class="form-group">
          <label>Photo (max 10MB) or Video (max 40MB)</label>
          <input id="t-media" type="file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,video/quicktime" />
          <p style="font-size:0.75rem;color:#6b7280;margin-top:0.35rem;">JPEG, PNG, WebP, GIF, MP4, or WebM. Uses S3 when APP_ENV=production; otherwise stored locally.</p>
          <div id="t-media-preview" style="margin-top:0.75rem;display:none;"></div>
          <button type="button" id="t-media-remove" class="btn btn-danger btn-sm" style="margin-top:0.5rem;display:none;" onclick="removeTestimonialMedia()">Remove media</button>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTestimonialModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Content (News / Blog) Modal -->
  <div class="modal-overlay" id="content-modal">
    <div class="modal modal-lg">
      <h3 id="content-modal-title">Add Post</h3>
      <form id="content-form">
        <input type="hidden" id="c-id" />
        <input type="hidden" id="c-type" />
        <div class="form-group"><label>Title *</label><input id="c-title" required /></div>
        <div class="form-row">
          <div class="form-group"><label>Slug (optional)</label><input id="c-slug" placeholder="auto-from-title" /></div>
          <div class="form-group"><label>Category</label><input id="c-category" placeholder="Visa Updates, Guides..." /></div>
        </div>
        <div class="form-group"><label>Excerpt</label><textarea id="c-excerpt" rows="2" placeholder="Short summary for listing cards"></textarea></div>
        <div class="form-group"><label>Body *</label><textarea id="c-body" rows="10" required placeholder="Use **bold** for headings. Separate paragraphs with blank lines."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Author</label><input id="c-author" value="Vision Team" /></div>
        </div>
        <div class="form-group">
          <label>Cover Image (max 10MB)</label>
          <input id="c-cover-file" type="file" accept="image/jpeg,image/png,image/webp,image/gif" />
          <div id="c-cover-preview" style="margin-top:0.75rem;display:none;"></div>
          <button type="button" id="c-cover-remove" class="btn btn-danger btn-sm" style="margin-top:0.5rem;display:none;" onclick="removeContentImage()">Remove image</button>
          <input type="hidden" id="c-cover" />
        </div>
        <div class="form-row">
          <div class="form-group"><label>Published</label><select id="c-published"><option value="true">Yes</option><option value="false">Draft</option></select></div>
          <div class="form-group"><label>Featured</label><select id="c-featured"><option value="false">No</option><option value="true">Yes</option></select></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeContentModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Offer Modal -->
  <div class="modal-overlay" id="offer-modal">
    <div class="modal modal-lg">
      <h3 id="offer-modal-title">Add Offer</h3>
      <form id="offer-form">
        <input type="hidden" id="o-id" />
        <div class="form-group"><label>Title *</label><input id="o-title" required placeholder="Free Laptop for Students" /></div>
        <div class="form-row">
          <div class="form-group"><label>Slug (optional)</label><input id="o-slug" placeholder="auto-from-title" /></div>
          <div class="form-group"><label>Offer Type *</label>
            <select id="o-type" required>
              <option value="laptop">Laptop</option>
              <option value="scholarship">Scholarship</option>
              <option value="test_prep">Test Prep</option>
              <option value="visa">Visa</option>
              <option value="gadget">Gadget</option>
              <option value="financial">Financial / Loan</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description *</label><textarea id="o-description" rows="4" required></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Badge Text</label><input id="o-badge" placeholder="FREE, SAVE, LIMITED..." /></div>
          <div class="form-group"><label>Valid Until</label><input id="o-valid" placeholder="31 Dec 2026" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>CTA Label</label><input id="o-cta-label" value="Claim Offer" /></div>
          <div class="form-group"><label>CTA Link</label><input id="o-cta-link" value="/contact-us" /></div>
        </div>
        <div class="form-group"><label>Terms &amp; Conditions</label><textarea id="o-terms" rows="2" placeholder="Eligibility and conditions..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Sort Order</label><input id="o-sort" type="number" value="0" /></div>
          <div class="form-group"><label>Status</label><select id="o-active"><option value="true">Active</option><option value="false">Inactive</option></select></div>
        </div>
        <div class="form-group"><label>Featured</label><select id="o-featured"><option value="false">No</option><option value="true">Yes</option></select></div>
        <div class="form-group">
          <label>Photo (max 10MB) or Video (max 40MB)</label>
          <input id="o-image" type="file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,video/quicktime" />
          <p style="font-size:0.75rem;color:#6b7280;margin-top:0.35rem;">JPEG, PNG, WebP, GIF, MP4, or WebM.</p>
          <div id="o-image-preview" style="margin-top:0.75rem;display:none;"></div>
          <button type="button" id="o-image-remove" class="btn btn-danger btn-sm" style="margin-top:0.5rem;display:none;" onclick="removeOfferImage()">Remove media</button>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeOfferModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const SECRET = window.location.pathname.replace('/admin/', '');
    const headers = { 'X-Admin-Secret': SECRET, 'Content-Type': 'application/json' };

    let cache = { enquiries: [], demo: [], loans: [], referrals: [], testimonials: [], news: [], blog: [], offers: [] };
    let statusOptions = { general: [], referral: [] };
    const filters = {
      enquiries: { search: '', status: '' },
      demo: { search: '', status: '', exam_type: '' },
      loans: { search: '', status: '' },
      referrals: { search: '', status: '' },
      testimonials: { search: '', is_active: '' },
      news: { search: '', is_published: '' },
      blog: { search: '', is_published: '' },
      offers: { search: '', offer_type: '', is_active: '' },
    };

    async function api(path, opts = {}) {
      const res = await fetch('/api/admin' + path, { ...opts, headers: { ...headers, ...opts.headers } });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || res.statusText); }
      return res.status === 204 ? null : res.json();
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function fmtDate(d) { return d ? new Date(d).toLocaleString('en-IN') : '-'; }

    function statusBadge(s) {
      const label = (s || 'pending').replace(/_/g, ' ');
      return `<span class="badge status-${s || 'pending'}">${label}</span>`;
    }

    function countByStatus(data) {
      const counts = {};
      data.forEach(r => { counts[r.status || 'pending'] = (counts[r.status || 'pending'] || 0) + 1; });
      return counts;
    }

    function renderStatPills(data, tabKey) {
      const counts = countByStatus(data);
      const total = data.length;
      let html = `<span class="stat-pill ${!filters[tabKey].status ? 'active' : ''}" onclick="setFilter('${tabKey}','status','')">All (${total})</span>`;
      Object.entries(counts).forEach(([st, n]) => {
        const active = filters[tabKey].status === st ? 'active' : '';
        html += `<span class="stat-pill ${active}" onclick="setFilter('${tabKey}','status','${st}')">${st.replace(/_/g,' ')} (${n})</span>`;
      });
      return `<div class="stat-pills">${html}</div>`;
    }

    function filterBar(tabKey, extra = '') {
      const f = filters[tabKey];
      return `<div class="filters">
        <input type="search" placeholder="🔍 Search name, email, phone..." value="${f.search}"
          oninput="setFilter('${tabKey}','search',this.value)" />
        <select onchange="setFilter('${tabKey}','status',this.value)">
          <option value="">All Statuses</option>
          ${(tabKey === 'referrals' ? statusOptions.referral : statusOptions.general).map(s =>
            `<option value="${s}" ${f.status===s?'selected':''}>${s.replace(/_/g,' ')}</option>`
          ).join('')}
        </select>
        ${extra}
        <button class="btn btn-secondary btn-sm" onclick="clearFilters('${tabKey}')">Clear</button>
      </div>`;
    }

    function setFilter(tab, field, value) {
      filters[tab][field] = value;
      renderTab(tab);
    }

    function clearFilters(tab) {
      Object.keys(filters[tab]).forEach(k => filters[tab][k] = '');
      renderTab(tab);
    }

    function openStatusModal(type, id, currentStatus, currentNotes) {
      document.getElementById('s-type').value = type;
      document.getElementById('s-id').value = id;
      const opts = type === 'referrals' ? statusOptions.referral : statusOptions.general;
      document.getElementById('s-status').innerHTML = opts.map(s =>
        `<option value="${s}" ${s===currentStatus?'selected':''}>${s.replace(/_/g,' ')}</option>`
      ).join('');
      document.getElementById('s-notes').value = currentNotes || '';
      document.getElementById('status-modal').classList.add('open');
    }

    function closeStatusModal() { document.getElementById('status-modal').classList.remove('open'); }

    document.getElementById('status-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const type = document.getElementById('s-type').value;
      const id = document.getElementById('s-id').value;
      const payload = {
        status: document.getElementById('s-status').value,
        admin_notes: document.getElementById('s-notes').value || null,
      };
      const paths = { enquiries: 'enquiries', demo: 'demo-classes', loans: 'education-loans', referrals: 'referrals' };
      try {
        await api(`/${paths[type]}/${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
        toast('Status updated');
        closeStatusModal();
        await loadAll();
      } catch (err) { toast(err.message, 'error'); }
    });

    function applyClientFilter(data, tabKey) {
      const f = filters[tabKey];
      return data.filter(r => {
        if (f.status && r.status !== f.status) return false;
        if (tabKey === 'demo' && f.exam_type && r.exam_type !== f.exam_type) return false;
        if (tabKey === 'testimonials' && f.is_active !== '' && String(r.is_active) !== f.is_active) return false;
        if ((tabKey === 'news' || tabKey === 'blog') && f.is_published !== '' && String(r.is_published) !== f.is_published) return false;
        if (tabKey === 'offers' && f.offer_type && r.offer_type !== f.offer_type) return false;
        if (tabKey === 'offers' && f.is_active !== '' && String(r.is_active) !== f.is_active) return false;
        if (f.search) {
          const hay = JSON.stringify(r).toLowerCase();
          if (!hay.includes(f.search.toLowerCase())) return false;
        }
        return true;
      });
    }

    function renderEnquiries() {
      const data = applyClientFilter(cache.enquiries, 'enquiries');
      document.getElementById('count-enquiries').textContent = cache.enquiries.length;
      const panel = document.getElementById('panel-enquiries');
      if (!data.length) { panel.innerHTML = filterBar('enquiries') + renderStatPills(cache.enquiries,'enquiries') + '<div class="empty">No enquiries found</div>'; return; }
      const rows = data.map(e => `<tr>
        <td>${e.id}</td>
        <td><strong>${e.first_name} ${e.last_name}</strong><br/><small>${e.email}</small></td>
        <td>${e.phone}</td><td>${e.destination}</td><td>${e.study_level}</td>
        <td>${e.intake}</td><td>${e.counselling_mode}</td>
        <td>${statusBadge(e.status)}</td>
        <td><span class="notes-preview" title="${e.admin_notes||''}">${e.admin_notes || '-'}</span></td>
        <td>${fmtDate(e.created_at)}</td>
        <td class="actions"><button class="btn btn-primary btn-sm" onclick="openStatusModal('enquiries',${e.id},'${e.status}','${(e.admin_notes||'').replace(/'/g,"\\'")}')">Update</button></td>
      </tr>`).join('');

    function mediaSrc(url) {
      if (!url) return '';
      if (url.startsWith('/api/media/')) return url;
      const match = url.match(/testimonials\/[a-f0-9]+\.[a-z0-9]+$/i);
      if (match) return '/api/media/' + match[0];
      return url.startsWith('http') ? url : url;

      const preview = document.getElementById('t-media-preview');

        preview.style.display = 'none';
        preview.innerHTML = '';
        removeBtn.style.display = 'none';
        return;
      }
      const src = mediaSrc(data.media_url);
      preview.style.display = 'block';
      removeBtn.style.display = 'inline-block';
      if (data.media_type === 'video') {
        preview.innerHTML = `<video src="${src}" controls style="width:100%;max-height:180px;border-radius:8px;background:#111;"></video>`;
      } else {
        preview.innerHTML = `<img src="${src}" alt="Preview" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;" />`;

      const file = e.target.files?.[0];
      pendingMediaRemove = false;
      if (!file) return;
      const isVideo = file.type.startsWith('video/');
      const maxBytes = isVideo ? 40 * 1024 * 1024 : 10 * 1024 * 1024;
      if (file.size > maxBytes) {
        toast(isVideo ? 'Video must be smaller than 40MB' : 'Image must be smaller than 10MB', 'error');
        e.target.value = '';
        return;
      }
      const url = URL.createObjectURL(file);
      const preview = document.getElementById('t-media-preview');
      preview.style.display = 'block';
      document.getElementById('t-media-remove').style.display = 'inline-block';
      preview.innerHTML = isVideo
        ? `<video src="${url}" controls style="width:100%;max-height:180px;border-radius:8px;background:#111;"></video>`
        : `<img src="${url}" alt="Preview" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;" />`;
    });

        preview.innerHTML = `<video src="${src}" controls style="width:100%;max-height:180px;border-radius:8px;background:#111;"></video>`;
      } else {
        preview.innerHTML = `<img src="${src}" alt="Preview" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;" />`;
      }
    }

    function renderOffers() {
      const data = applyClientFilter(cache.offers, 'offers');
      document.getElementById('count-offers').textContent = cache.offers.length;
      const panel = document.getElementById('panel-offers');
      const typeFilter = `<select onchange="setFilter('offers','offer_type',this.value)">
        <option value="">All Types</option>
        ${Object.entries(OFFER_TYPE_LABELS).map(([k,v]) => `<option value="${k}" ${filters.offers.offer_type===k?'selected':''}>${v}</option>`).join('')}
      </select>`;
      const activeFilter = `<select onchange="setFilter('offers','is_active',this.value)">
        <option value="">All</option>
        <option value="true" ${filters.offers.is_active==='true'?'selected':''}>Active</option>
        <option value="false" ${filters.offers.is_active==='false'?'selected':''}>Inactive</option>
      </select>`;
      const toolbar = `<div class="toolbar"><h2>Student Offers (${data.length})</h2>
        <button class="btn btn-primary" onclick="openOfferModal()">+ Add Offer</button></div>`;
      if (!data.length) {
        panel.innerHTML = toolbar + filterBar('offers', typeFilter + activeFilter) + '<div class="empty">No offers found</div>';
        return;
      }
      const rows = data.map(o => {
        const mediaCell = o.image_url
          ? (o.media_type === 'video'
            ? `<span class="media-badge">video</span>`
            : `<img class="media-thumb" src="${offerImageSrc(o.image_url)}" alt="" />`)
          : '—';
        return `<tr>
          <td>${o.id}</td>
          <td>${mediaCell}</td>
          <td><strong>${o.title}</strong><br/><small>${OFFER_TYPE_LABELS[o.offer_type] || o.offer_type}</small></td>
          <td>${o.badge_text || '—'}</td>
          <td><span class="badge ${o.is_active?'badge-active':'badge-inactive'}">${o.is_active?'Active':'Inactive'}</span></td>
          <td>${o.is_featured ? '★' : '—'}</td>
          <td>${o.sort_order}</td>
          <td class="actions">
            <button class="btn btn-secondary btn-sm" onclick="editOffer(${o.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteOffer(${o.id})">Delete</button>
          </td>
        </tr>`;
      }).join('');
      panel.innerHTML = toolbar + filterBar('offers', typeFilter + activeFilter) + `<div class="card"><table><thead><tr>
        <th>ID</th><th>Image</th><th>Title</th><th>Badge</th><th>Status</th><th>Featured</th><th>Order</th><th>Actions</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function openOfferModal(data = null) {
      pendingOfferImageRemove = false;
      document.getElementById('o-image').value = '';
      document.getElementById('offer-modal-title').textContent = data ? 'Edit Offer' : 'Add Offer';
      document.getElementById('o-id').value = data?.id || '';
      document.getElementById('o-title').value = data?.title || '';
      document.getElementById('o-slug').value = data?.slug || '';
      document.getElementById('o-type').value = data?.offer_type || 'laptop';
      document.getElementById('o-description').value = data?.description || '';
      document.getElementById('o-badge').value = data?.badge_text || '';
      document.getElementById('o-valid').value = data?.valid_until || '';
      document.getElementById('o-cta-label').value = data?.cta_label || 'Claim Offer';
      document.getElementById('o-cta-link').value = data?.cta_link || '/contact-us';
      document.getElementById('o-terms').value = data?.terms || '';
      document.getElementById('o-sort').value = data?.sort_order || 0;
      document.getElementById('o-active').value = data?.is_active !== false ? 'true' : 'false';
      document.getElementById('o-featured').value = data?.is_featured ? 'true' : 'false';
      renderOfferImagePreview(data);
      document.getElementById('offer-modal').classList.add('open');
    }
    function closeOfferModal() { document.getElementById('offer-modal').classList.remove('open'); }
    function editOffer(id) { const o = cache.offers.find(x => x.id === id); if (o) openOfferModal(o); }

    document.getElementById('o-image').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      pendingOfferImageRemove = false;
      if (!file) return;
      const isVideo = file.type.startsWith('video/');
      const maxBytes = isVideo ? 40 * 1024 * 1024 : 10 * 1024 * 1024;
      if (file.size > maxBytes) {
        toast(isVideo ? 'Video must be smaller than 40MB' : 'Image must be smaller than 10MB', 'error');
        e.target.value = '';
        return;
      }
      const url = URL.createObjectURL(file);
      const preview = document.getElementById('o-image-preview');
      preview.style.display = 'block';
      document.getElementById('o-image-remove').style.display = 'inline-block';
      preview.innerHTML = isVideo
        ? `<video src="${url}" controls style="width:100%;max-height:180px;border-radius:8px;background:#111;"></video>`
        : `<img src="${url}" alt="Preview" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;" />`;
    });

    function removeOfferImage() {
      pendingOfferImageRemove = true;
      document.getElementById('o-image').value = '';
      document.getElementById('o-image-preview').style.display = 'none';
      document.getElementById('o-image-preview').innerHTML = '';
      document.getElementById('o-image-remove').style.display = 'none';
    }

    async function uploadOfferImage(offerId, file) {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch('/api/admin/offers/' + offerId + '/image', {
        method: 'POST',
        headers: { 'X-Admin-Secret': SECRET },
        body: fd,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    document.getElementById('offer-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('o-id').value;
      const imageFile = document.getElementById('o-image').files?.[0];
      const payload = {
        title: document.getElementById('o-title').value,
        slug: document.getElementById('o-slug').value || null,
        offer_type: document.getElementById('o-type').value,
        description: document.getElementById('o-description').value,
        badge_text: document.getElementById('o-badge').value || null,
        valid_until: document.getElementById('o-valid').value || null,
        cta_label: document.getElementById('o-cta-label').value || 'Claim Offer',
        cta_link: document.getElementById('o-cta-link').value || '/contact-us',
        terms: document.getElementById('o-terms').value || null,
        sort_order: parseInt(document.getElementById('o-sort').value) || 0,
        is_active: document.getElementById('o-active').value === 'true',
        is_featured: document.getElementById('o-featured').value === 'true',
      };
      try {
        let offerId = id;
        if (id) {
          await api('/offers/' + id, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          const created = await api('/offers', { method: 'POST', body: JSON.stringify(payload) });
          offerId = created.id;
        }
        if (pendingOfferImageRemove && offerId) {
          await api('/offers/' + offerId + '/image', { method: 'DELETE' });
        }
        if (imageFile && offerId) {
          await uploadOfferImage(offerId, imageFile);
        }
        toast(id ? 'Updated' : 'Created');
        closeOfferModal();
        loadAll();
      } catch (err) { toast(err.message, 'error'); }
    });

    async function deleteOffer(id) {
      if (!confirm('Delete this offer?')) return;
      try { await api('/offers/' + id, { method: 'DELETE' }); toast('Deleted'); loadAll(); }
      catch (err) { toast(err.message, 'error'); }
    }

    loadAll();
  </script>
</body>
</html>
