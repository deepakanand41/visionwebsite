# Example nginx site config for vision.educollab.com
# Copy/adapt to: /etc/nginx/sites-available/vision
#
# Required for testimonial video uploads (up to 40MB).
# Without client_max_body_size, nginx returns 413 before FastAPI receives the file.

server {
    listen 80;
    listen [::]:80;
    server_name vision.educollab.com;

    # Allow video uploads up to 40MB (+ small multipart overhead)
    client_max_body_size 50m;
    client_body_timeout 300s;

    root /var/www/vision/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        client_max_body_size 50m;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
